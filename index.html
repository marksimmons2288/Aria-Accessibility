<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!--Styles-->
    <link rel="stylesheet" href="./styles.css">
    
</head>
<body>
    <header class="header">
        <h1>Welcome to my Registration Form</h1>
    </header>
   
    <main>
        <h2>Registrant Information:</h2>

        <form action="" class="main_form" id="main-form">
              <!-- Interests Checkboxes -->
             <h3> Interest Catagories:</h3>
            <div class="check_box_field">
            <input type="checkbox" name=""> Sports
            <input type="checkbox" name=""> Business
            <input type="checkbox" name=""> Technology
            <input type="checkbox" name=""> Entertainment
            </div>
        <!-- First Name -->
        <div class="main_form_field">
            <label for="firstName"
            class="main_form_field_label">First name:</label>
            <!-- Aria Label  -->
            <input type="text" id="firstName" aria-label="Enter first name your name"
            class="main_form_field_input" required>
        </div>
       
        <!-- Last Name -->
         <div class="main_form_field">
            <label for="lastName" class="main_form_field_label">Last name:</label>
            <input type="text" id="lastName"
            class="main_form_field_input" required>
         </div>

         <!-- E-mail Input -->
          <div class="main_form_field">
           <label for="email"
            class="main_form_field_label">E-mail:</label>
            <input type="email" id="email"
            class="main_form_field_input" required> 
            </div> 

            <!-- Date of Birth -->
          <div class="main_form_field">
           <label for="date"
            class="main_form_field_label">Date of Birth:</label>
            <input type="date" id="date"
            class="main_form_field_input" required>
            </div>

            <!-- Password -->
          <div class="main_form_field">
           <label for="password"
            class="main_form_field_label">Password:</label>
            <input type="password" placeholder="Create Password" id="password" minlength="6"
            class="main_form_field_input" required>
          </div>
        
          <!-- Checkbox -->
          <div class="main_form_field">
           <label for="checkbox"
            class="main_form_field_label">Check this box after all fields have been filled:</label>
            <input type="checkbox" id="checkbox"
            class="main_form_field_input" required>  
          </div>  

            


            <!-- Submit button with aria-label -->
         <button class="main_form_submit" type="submit" aria-label="This is a submit button">Submit</button>
         
         
        

        
    </form>
    </main>
            <div id="output"></div>
    <!-- Javascript -->
     <script src="./main.js"></script>
    
    
    
</body>
</html>
